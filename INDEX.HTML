<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Anandita, will you let me kiss you? 💋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-top: #fff0f5;
      --bg-bot: #ffd6e8;
      --card: rgba(255,255,255,0.85);
      --yes: #e8185a;
      --yes-hover: #c4134c;
      --no: #f1f5f9;
      --no-text: #475569;
      --text: #1e1023;
      --subtext: #7c3262;
      --radius: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: radial-gradient(ellipse at 60% 10%, #ffe0ef 0%, var(--bg-bot) 100%);
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      padding: 20px;
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .hearts-bg span {
      position: absolute;
      bottom: -60px;
      font-size: clamp(16px, 3vw, 28px);
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);  opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-105vh) rotate(40deg); opacity: 0; }
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(680px, 94vw);
      padding: clamp(24px, 5vw, 44px) clamp(20px, 5vw, 40px);
      background: var(--card);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      text-align: center;
      box-shadow: 0 24px 80px rgba(200, 30, 80, 0.18);
      border: 1.5px solid rgba(255,255,255,0.9);
    }

    .art {
      width: min(200px, 60vw);
      margin: 0 auto 4px;
      display: block;
      animation: bobble 3s ease-in-out infinite;
    }
    @keyframes bobble {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 4.5vw, 40px);
      font-weight: 900;
      color: var(--text);
      line-height: 1.2;
      margin: 14px 0 6px;
    }

    .name-highlight { color: var(--yes); }

    .tagline {
      font-size: clamp(14px, 1.8vw, 16px);
      color: var(--subtext);
      margin-bottom: 22px;
    }

    .button-zone {
      position: relative;
      width: 100%;
      height: 160px; /* Slightly taller for more running room */
      margin: 0 auto;
      touch-action: none;
    }

    button {
      position: absolute;
      padding: 15px 32px;
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      font-weight: 700;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      user-select: none;
      transition: background .15s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #yesBtn {
      left: 15%;
      top: 50%;
      transform: translateY(-50%);
      background: var(--yes);
      color: #fff;
      z-index: 10;
    }

    #noBtn {
      right: 15%;
      top: 50%;
      transform: translateY(-50%);
      background: var(--no);
      color: var(--no-text);
      white-space: nowrap;
    }

    .hint {
      font-size: 14px;
      color: var(--subtext);
      margin-top: 10px;
      min-height: 20px;
      font-style: italic;
    }

    .result {
      display: none;
      animation: popIn .5s cubic-bezier(.175,.885,.32,1.27) forwards;
    }
    @keyframes popIn {
      from { transform: scale(.8); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .result h2 { font-size: clamp(32px, 6vw, 48px); color: var(--yes); margin-bottom: 15px; }
    .fireworks { width: 100%; max-width: 350px; border-radius: 12px; }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>
  <canvas id="confettiCanvas"></canvas>

  <main class="card">
    <svg class="art" viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="furGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#fdd9b5"/><stop offset="100%" stop-color="#f4a35e"/>
        </radialGradient>
        <radialGradient id="blush" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff8fab" stop-opacity="0.6"/><stop offset="100%" stop-color="#ff8fab" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <path d="M248 38 C248 22 265 14 276 26 C287 14 304 22 304 38 C304 62 276 80 276 94 C276 80 248 62 248 38Z" fill="#e8185a"/>
      <ellipse cx="188" cy="160" rx="98" ry="88" fill="url(#furGrad)"/>
      <ellipse cx="188" cy="110" rx="72" ry="64" fill="url(#furGrad)"/>
      <circle cx="164" cy="102" r="9" fill="#2d1a0e"/>
      <circle cx="212" cy="102" r="9" fill="#2d1a0e"/>
      <ellipse cx="188" cy="126" rx="30" ry="22" fill="#f9caa7"/>
      <ellipse cx="148" cy="118" rx="18" ry="10" fill="url(#blush)"/>
      <ellipse cx="228" cy="118" rx="18" ry="10" fill="url(#blush)"/>
      <path d="M176 128 Q188 138 200 128" stroke="#c0614a" stroke-width="2.5" fill="none" />
    </svg>

    <div id="mainContent">
      <h1><span class="name-highlight">Anandita</span>,<br>will you let me kiss you?</h1>
      <p class="tagline">A little peck? Just one? 🥺</p>
      
      <section class="button-zone" id="zone">
        <button id="yesBtn">Yes 💋</button>
        <button id="noBtn">No 😳</button>
      </section>
      <div class="hint" id="hint">The "No" button is a little shy… 😳</div>
    </div>

    <section class="result" id="result">
      <h2>💋 Mwah! 💋</h2>
      <p>Yesss! Best decision ever 😘✨</p>
      <img class="fireworks" src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" alt="Celebration" />
    </section>
  </main>

  <script>
    // Create floating hearts
    const heartsBg = document.getElementById('heartsBg');
    const heartEmojis = ['💕','💗','💖','❤️','🩷'];
    for (let i = 0; i < 15; i++) {
      const s = document.createElement('span');
      s.textContent = heartEmojis[i % heartEmojis.length];
      s.style.left = Math.random() * 100 + '%';
      s.style.animationDuration = (5 + Math.random() * 10) + 's';
      s.style.animationDelay = Math.random() * 5 + 's';
      heartsBg.appendChild(s);
    }

    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const zone = document.getElementById('zone');
    const hint = document.getElementById('hint');
    let yesScale = 1;

    // Movement logic
    function moveNo(e) {
      const padding = 20;
      const zoneRect = zone.getBoundingClientRect();
      const noRect = noBtn.getBoundingClientRect();
      
      // Calculate new random position within the zone
      let newX = Math.random() * (zoneRect.width - noRect.width - padding);
      let newY = Math.random() * (zoneRect.height - noRect.height - padding);

      noBtn.style.left = newX + 'px';
      noBtn.style.top = newY + 'px';
      noBtn.style.right = 'auto'; // Reset initial right position
      noBtn.style.transform = 'none';

      // Grow Yes button
      yesScale += 0.15;
      yesBtn.style.transform = `translateY(-50%) scale(${yesScale})`;
      
      updateHint();
    }

    function updateHint() {
      const hints = ["It keeps running away! 😅", "Resistance is futile 😈", "Just click the big red button... 💋"];
      if (yesScale > 1.5) hint.textContent = hints[0];
      if (yesScale > 2) hint.textContent = hints[1];
      if (yesScale > 2.5) hint.textContent = hints[2];
    }

    // Trigger on hover (PC) and touch (Mobile)
    noBtn.addEventListener('mouseenter', moveNo);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNo();
    });

    // Success
    yesBtn.addEventListener('click', () => {
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('hint').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#e8185a', '#ffb3cc', '#ffffff']
      });
    });
  </script>
</body>
</html>
